{# Shared unit conversion JS — included in add_po.html and add_stock_in.html #}
<script>
/**
 * UNIT SYSTEM
 * -----------
 * All quantities stored in sq.m (4 decimal places).
 * Rates stored in ₹/sq.m.
 * No conversion needed — user enters sq.m, DB stores sq.m.
 *
 * Sheet dimensions are in FEET (readonly in PO/GRN — set on product only).
 * Pieces mode: qty = pieces × product.effective_sheet_sqm
 *   effective_sheet_sqm = sheet_sqm_override if set, else sheet_sqm (auto-calculated)
 */

const PRODUCT_CACHE = {};

async function fetchProduct(pid) {
  if (!pid) return null;
  if (PRODUCT_CACHE[pid]) return PRODUCT_CACHE[pid];
  try {
    const r = await fetch('/api/product/' + pid + '/');
    PRODUCT_CACHE[pid] = await r.json();
    return PRODUCT_CACHE[pid];
  } catch { return null; }
}

function getLI(el) { return el.closest('.line-item'); }

/**
 * calcSqm — called when pieces or sheet dims change.
 * qty = pieces × effective_sheet_sqm  (all in sq.m already)
 * Stores result directly into qty_sqm[] hidden field.
 */
function calcSqm(li) {
  const pcs  = parseFloat(li.querySelector('[name="pieces[]"]')?.value) || 0;
  const prod = li._productData;  // set by onProductChange
  if (!prod) return;

  // Use override if set, else auto sheet_sqm
  const sheetSqm = prod.sheet_sqm_override ?? prod.sheet_sqm;
  const qtySqm   = pcs * sheetSqm;

  // Store in hidden qty_sqm[] field (inside pcs-section)
  li.querySelectorAll('[name="qty_sqm[]"]').forEach(inp => {
    if (!inp.closest('.sqm-section')) {
      inp.value = qtySqm > 0 ? qtySqm.toFixed(4) : '';
    }
  });

  // Display to user
  const disp = li.querySelector('.qty-calc');
  if (disp) {
    if (pcs && sheetSqm) {
      const overrideNote = prod.sheet_sqm_override
        ? ` <span style="color:#2a5aaa;font-size:10px;">(using override ${prod.sheet_sqm_override.toFixed(4)})</span>`
        : '';
      disp.innerHTML = `${pcs} pcs × ${sheetSqm.toFixed(4)} sq.m = <strong>${qtySqm.toFixed(4)} sq.m</strong>${overrideNote}`;
      disp.style.color = 'var(--wood-600)';
    } else {
      disp.textContent = 'Select product and enter pieces';
      disp.style.color = 'var(--tm)';
    }
  }
  calcLineAmount(li);
}

/**
 * calcLineAmount — amount = qty_sqm × rate_per_sqm
 */
function calcLineAmount(li) {
  let qty = 0;
  li.querySelectorAll('[name="qty_sqm[]"]').forEach(inp => {
    const v = parseFloat(inp.value) || 0;
    if (v > 0) qty = v;
  });
  const rate = parseFloat(li.querySelector('[name="rate_per_sqm[]"]')?.value) || 0;
  const amt  = qty * rate;
  const amtEl = li.querySelector('.li-amt');
  if (amtEl) amtEl.value = amt > 0 ? amt.toLocaleString('en-IN', {maximumFractionDigits: 2}) : '';
  updateGrandTotal();
}

function updateGrandTotal() {
  let total = 0;
  document.querySelectorAll('.li-amt').forEach(a => {
    total += parseFloat((a.value || '0').replace(/,/g, '')) || 0;
  });
  ['po-total', 'si-total', 'si-items-total'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '₹' + total.toLocaleString('en-IN', {maximumFractionDigits: 0});
  });
}

async function onUnitChange(sel) {
  const li   = getLI(sel);
  const unit = sel.value;
  const unitHidden = li.querySelector('[name="qty_unit[]"]');
  if (unitHidden) unitHidden.value = unit;

  const pcsSections = li.querySelectorAll('.pcs-section');
  const sqmSections = li.querySelectorAll('.sqm-section');

  if (unit === 'pcs') {
    sqmSections.forEach(s => s.style.display = 'none');
    pcsSections.forEach(s => s.style.display = '');
    li.querySelectorAll('.sqm-section [name="qty_sqm[]"]').forEach(inp => inp.value = '');
    // Trigger pieces calc if product already selected
    if (li._productData) calcSqm(li);
  } else {
    pcsSections.forEach(s => s.style.display = 'none');
    sqmSections.forEach(s => s.style.display = '');
    li.querySelectorAll('.pcs-section [name="qty_sqm[]"]').forEach(inp => inp.value = '');
    // User types sq.m directly — sync visible to hidden
    const sqmVisible = li.querySelector('.sqm-input');
    const sqmHidden  = li.querySelector('.sqm-section [name="qty_sqm[]"]');
    if (sqmVisible && sqmHidden) sqmHidden.value = sqmVisible.value;
    calcLineAmount(li);
  }
}

async function onProductChange(sel) {
  const li  = getLI(sel);
  const pid = sel.value;
  if (!pid) return;
  const prod = await fetchProduct(pid);
  if (!prod) return;
  li._productData = prod;  // cache on element

  // Sheet dims are readonly — populate from product (display only)
  const lenEl = li.querySelector('[name="sheet_length[]"]');
  const widEl = li.querySelector('[name="sheet_width[]"]');
  if (lenEl) { lenEl.value = prod.sheet_length; lenEl.setAttribute('readonly', ''); }
  if (widEl) { widEl.value = prod.sheet_width;  widEl.setAttribute('readonly', ''); }

  // Show effective sq.m info
  const info = li.querySelector('.product-stock-info');
  if (info) {
    const effSqm = prod.sheet_sqm_override ?? prod.sheet_sqm;
    const overrideNote = prod.sheet_sqm_override
      ? ` · <span style="color:#2a5aaa;">override: ${prod.sheet_sqm_override.toFixed(4)} sq.m/sheet</span>`
      : ` · auto: ${prod.sheet_sqm.toFixed(4)} sq.m/sheet`;
    info.innerHTML = `Stock: <strong>${parseFloat(prod.stock_qty).toFixed(4)} sq.m</strong>  |  ${prod.sheet_length}×${prod.sheet_width} ft${overrideNote}`;
  }

  const unit = li.querySelector('.unit-sel')?.value;
  if (unit === 'pcs') calcSqm(li);
}

// Called when user types directly in sq.m-section visible input
function onSqmInput(inp) {
  const li = getLI(inp);
  const hidden = li.querySelector('.sqm-section [name="qty_sqm[]"]');
  if (hidden) hidden.value = inp.value;  // same value — user entered sq.m directly
  calcLineAmount(li);
}

function removeLI(btn) {
  const container = btn.closest('.line-item').parentElement;
  btn.closest('.line-item').remove();
  const items = container.querySelectorAll('.line-item');
  items.forEach((item, i) => {
    const num = item.querySelector('.li-num');
    if (num) num.textContent = i + 1;
  });
  if (items.length === 1) {
    const del = items[0].querySelector('.li-del');
    if (del) del.style.display = 'none';
  }
  updateGrandTotal();
}
</script>
