{% extends "godown/base.html" %}
{% block title %}Add Expense{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script>
$(function(){
  $('#exp-form').validate({
    rules:{description:{required:true},paid_to:{required:true},amount:{required:true,number:true,min:0.01}},
    messages:{description:{required:'Description required'},paid_to:{required:'Paid to required'},amount:{required:'Amount required',number:'Enter valid amount',min:'Must be > 0'}},
    errorClass:'field-error',errorElement:'div',
    errorPlacement:function(e,el){e.css({'color':'#b33a36','font-size':'11px','margin-top':'3px'});e.insertAfter(el);},
    highlight:function(el){$(el).css('border-color','#b33a36');},
    unhighlight:function(el){$(el).css('border-color','');}
  });
});
</script>
{% endblock %}
{% block page_title %}Add Expense{% endblock %}
{% block content %}
<div class="fp-header"><a class="fp-back" href="{% url 'expenses' %}"><i class="bi bi-arrow-left"></i></a><span class="fp-title">Add Expense</span></div>
<form method="post" id="exp-form" novalidate>{% csrf_token %}
<div class="cv">
  <div class="frow"><div class="fhalf"><label class="fl">Category *</label><select class="fc fsel" name="category" required>
        <option value="">Select category</option>
        {% for val, label in expense_categories %}
          <option value="{{ val }}">{{ label }}</option>
        {% endfor %}
      </select></div><div class="fhalf"><label class="fl">Date *</label><input class="fc" name="date" type="date" required value="{% now 'Y-m-d' %}"></div></div>
  <div class="frow"><div class="ffull"><label class="fl">Description *</label><input class="fc" name="description" required placeholder="Brief note about this expense"></div></div>
  <div class="frow"><div class="fhalf"><label class="fl">Paid To *</label><input class="fc" name="paid_to" required placeholder="Person or company name"></div><div class="fhalf"><label class="fl">Amount (₹) *</label><input class="fc" name="amount" type="number" step="0.01" required placeholder="0"></div></div>
  <div class="frow"><div class="fhalf"><label class="fl">Payment Mode</label><select class="fc fsel" name="payment_mode"><option value="cash">Cash</option><option value="bank">Bank Transfer</option><option value="upi">UPI</option><option value="cheque">Cheque</option><option value="online">Online</option></select></div><div class="fhalf"><label class="fl">Status</label><select class="fc fsel" name="status"><option value="paid">Paid</option><option value="pending">Pending</option></select></div></div>
  <div class="frow"><div class="ffull"><label class="fl">Bill / Receipt No</label><input class="fc" name="bill_number" placeholder="For record keeping (optional)"></div></div>
</div>
<div class="fp-actions"><a class="bs" href="{% url 'expenses' %}">Cancel</a><button class="bw" type="submit"><i class="bi bi-check2"></i> Save Expense</button></div>
</form>{% endblock %}
