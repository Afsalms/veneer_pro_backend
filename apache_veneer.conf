# VeneerPro — Apache mod_wsgi configuration
# Place this in /etc/apache2/sites-available/veneer_pro.conf
# Then: sudo a2ensite veneer_pro && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    # Project paths — adjust to your actual deployment path
    Define PROJ_ROOT /home/afsal/veneer_pro_backend
    Define VENV_ROOT /home/afsal/veneer_pro_backend/venv

    # ── mod_wsgi daemon mode ──────────────────────────────────────
    # CRITICAL: daemon mode prevents the "populate() isn't reentrant" error.
    # Each Django app runs in its own isolated process group.
    WSGIDaemonProcess veneer_pro \
        python-home=${VENV_ROOT} \
        python-path=${PROJ_ROOT} \
        processes=2 \
        threads=15 \
        display-name=%{GROUP}

    WSGIProcessGroup veneer_pro

    # CRITICAL: This line fixes "populate() isn't reentrant" in mod_wsgi.
    # It ensures all WSGI apps in the same Python interpreter share one Django instance.
    WSGIApplicationGroup %{GLOBAL}

    WSGIScriptAlias / ${PROJ_ROOT}/veneer_pro/wsgi.py

    # ── Static files served directly by Apache (fast, no Django) ─
    Alias /static/ ${PROJ_ROOT}/staticdir/
    <Directory ${PROJ_ROOT}/staticdir>
        Require all granted
        Options -Indexes
    </Directory>

    # ── WSGI script permissions ───────────────────────────────────
    <Directory ${PROJ_ROOT}/veneer_pro>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # ── Security headers ──────────────────────────────────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"

    # ── Logs ─────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/veneer_pro_error.log
    CustomLog ${APACHE_LOG_DIR}/veneer_pro_access.log combined

</VirtualHost>

# HTTPS — uncomment and configure after SSL certificate is installed
# (use: sudo certbot --apache -d yourdomain.com)
#
# <VirtualHost *:443>
#     ServerName yourdomain.com
#     ... (same as above, certbot will add SSL lines automatically)
# </VirtualHost>
